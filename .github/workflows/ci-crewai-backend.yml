name: CI - CrewAI Backend

on:
  pull_request:
    paths:
      - 'mellea_contribs/crewai_backend/**'
      - '.github/workflows/ci-crewai-backend.yml'
      - '.github/workflows/quality-crewai-backend.yml'
  push:
    branches:
      - main
    paths:
      - 'mellea_contribs/crewai_backend/**'
      - '.github/workflows/ci-crewai-backend.yml'
      - '.github/workflows/quality-crewai-backend.yml'

jobs:
  test:
    uses: ./.github/workflows/quality-crewai-backend.yml


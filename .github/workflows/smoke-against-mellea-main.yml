name: smoke-against-mellea-main

# Daily smoke against mellea@main per subpackage. The matrix is read from
# .github/smoke-matrix.json so that subpackages opt in explicitly. While the
# list is empty the smoke job is skipped (load-matrix still runs and reports).
#
# The smoke reuses package-ci.yml (the PR-CI reusable workflow) with
# mellea_ref=main so smoke and PR CI share ONE environment (Ollama setup,
# [tool.mellea-contribs.ci] flags, python matrix) and ONE test selector. The
# only difference is that package-ci pip-installs mellea@main after `uv sync`.
# The auto-issue bot reporting also lives inside package-ci (gated on
# mellea_ref) — a `uses:` caller job cannot host its own steps, and a matrix
# `uses:` job exposes only one aggregate result, which cannot distinguish
# which package passed. See package-ci.yml for the full rationale.

"on":
  schedule:
    - cron: "17 7 * * *"  # 07:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write  # auto_issue_bot.py writes per-package state under .github/bot-state/
  issues: write

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
      empty: ${{ steps.load.outputs.empty }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: |
          set -euo pipefail
          MATRIX=$(jq -c '.subpackages' .github/smoke-matrix.json)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          if [ "${MATRIX}" = "[]" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "Smoke matrix is empty (no subpackages opted in yet); the smoke job will be skipped."
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

  smoke:
    needs: load-matrix
    if: needs.load-matrix.outputs.empty == 'false'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
    uses: ./.github/workflows/package-ci.yml
    with:
      package: ${{ matrix.package }}
      mellea_ref: main
    permissions:
      contents: write  # auto_issue_bot.py (invoked inside package-ci) writes bot-state and issues
      issues: write
    secrets: inherit

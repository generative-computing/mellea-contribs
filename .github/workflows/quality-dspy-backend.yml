name: Quality - DSPy Backend

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CICD: 1
  OLLAMA_HOST: "127.0.0.1:5000"

jobs:
  test-dspy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        uses: ./.github/actions/free-disk-space
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start serving ollama
        run: nohup ollama serve &
      - name: Pull model granite4:micro
        run: ollama pull granite4:micro
      - name: Install dependencies and run tests
        run: |
          cd mellea_contribs/dspy_backend
          if ! command -v uv &> /dev/null; then
            echo "Installing uv..."
            pip install uv
          fi
          echo "Setting up virtual environment and installing dependencies..."
          uv sync --dev
          echo "Running tests..."
          uv run -- pytest -v tests/
      - name: Send failure message
        if: failure()
        run: echo "DSPy backend tests failed. Please verify that tests are working locally."

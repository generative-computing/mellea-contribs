name: "Receive mellea release"

# Listens for repository_dispatch from mellea (event_type=mellea-released)
# and opens one bump PR per subpackage in dependency-tier order. The same
# workflow re-runs when a tier-N bump PR merges, advancing to tier-(N+1).
#
# Triggered by:
#   - mellea/.github/workflows/dispatch-to-contribs.yml (initial event)
#   - pull_request closed-merged where head starts with sync-mellea-
#     (advances tiers as PRs land)
#   - workflow_dispatch (manual recovery)

on:
  repository_dispatch:
    types: [mellea-released]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: "Mellea version to sync (manual / recovery)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Only act on tier-advancement PRs that actually merged. Other PR
    # close events are ignored.
    if: |
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.action == 'closed' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'sync-mellea-'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            # pull_request: extract version from branch name (sync-mellea-<ver>-<pkg>)
            BRANCH="${{ github.event.pull_request.head.ref }}"
            VERSION=$(echo "$BRANCH" | sed -E 's/^sync-mellea-([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: could not resolve mellea version from event payload."
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Syncing mellea-contribs to mellea v${VERSION}"

      - name: Checkout mellea-contribs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Configure git for bot commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Open per-package bump PRs for the active tier
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          uv run python .github/scripts/open_per_package_bump_prs.py . "$VERSION"

name: Quality - CrewAI Backend

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CICD: 1

jobs:
  test-crewai-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start serving ollama
        run: nohup ollama serve &
      - name: Pull model granite4:micro
        run: ollama pull granite4:micro
      - name: Install dependencies and run tests
        run: |
          cd mellea_contribs/crewai_backend
          if ! command -v uv &> /dev/null; then
            echo "Installing uv..."
            pip install uv
          fi
          echo "Setting up virtual environment..."
          uv venv
          source .venv/bin/activate
          echo "Installing mellea-integration-core..."
          uv pip install -e ../mellea-integration-core
          echo "Installing crewai_backend..."
          uv pip install -e .
          echo "Installing test dependencies..."
          uv pip install pytest pytest-asyncio pytest-cov
          echo "Running tests..."
          python -m pytest -v tests/ --ignore=tests/integration
          deactivate
      - name: Send failure message
        if: failure()
        run: echo "CrewAI backend tests failed. Please verify that tests are working locally."

name: CI - Subpackage Validation

on:
  pull_request:
    paths:
      - 'mellea_contribs/**'
      - '.github/workflows/ci-*.yml'
      - '.github/workflows/quality-generic.yml'
      - '.github/workflows/ci-subpackage-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'mellea_contribs/**'
      - '.github/workflows/ci-*.yml'
      - '.github/workflows/quality-generic.yml'
      - '.github/workflows/ci-subpackage-validation.yml'

jobs:
  validate-subpackage-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate subpackage CI configurations
        run: |
          set -e

          echo "=== Validating CI configurations for mellea_contribs subpackages ==="
          echo ""

          # Track validation status
          all_valid=true
          missing_ci=()
          no_tests=()

          # Find all subpackages (directories with pyproject.toml)
          subpackages=()
          for dir in mellea_contribs/*/; do
            if [ -f "${dir}pyproject.toml" ]; then
              subpackage=$(basename "$dir")
              subpackages+=("$subpackage")
            fi
          done

          echo "Found ${#subpackages[@]} subpackages:"
          printf '  - %s\n' "${subpackages[@]}"
          echo ""

          # Validate each subpackage
          for subpackage in "${subpackages[@]}"; do
            echo "Checking: $subpackage"

            # Convert subpackage name to CI filename format
            # e.g., langchain_backend -> ci-langchain-backend.yml
            ci_name=$(echo "$subpackage" | sed 's/_/-/g')
            ci_file=".github/workflows/ci-${ci_name}.yml"

            # Check if CI file exists
            if [ ! -f "$ci_file" ]; then
              echo "  ❌ Missing CI file: $ci_file"
              missing_ci+=("$subpackage")
              all_valid=false
              continue
            fi
            echo "  ✓ CI file exists: $ci_file"

            # Validate CI file references generic quality workflow
            if ! grep -q "quality-generic.yml" "$ci_file"; then
              echo "  ⚠️  Warning: CI file may not reference quality-generic.yml"
            else
              echo "  ✓ CI file references quality-generic.yml"
            fi

            # Check if subpackage has test directory
            subpackage_dir="mellea_contribs/${subpackage}"
            if [ ! -d "$subpackage_dir/tests" ] && [ ! -d "$subpackage_dir/test" ]; then
              echo "  ❌ No tests/ or test/ directory found"
              no_tests+=("$subpackage")
              all_valid=false
            else
              if [ -d "$subpackage_dir/tests" ]; then
                echo "  ✓ Found tests/ directory"
              fi
              if [ -d "$subpackage_dir/test" ]; then
                echo "  ✓ Found test/ directory"
              fi
            fi

            echo ""
          done

          # Summary report
          echo "=== Validation Summary ==="
          echo ""

          if [ "$all_valid" = true ]; then
            echo "✅ All subpackages have valid CI configurations!"
            exit 0
          else
            echo "❌ Validation failed for one or more subpackages"
            echo ""

            if [ ${#missing_ci[@]} -gt 0 ]; then
              echo "Subpackages missing CI files:"
              printf '  - %s\n' "${missing_ci[@]}"
              echo ""
            fi

            if [ ${#no_tests[@]} -gt 0 ]; then
              echo "Subpackages missing test directories:"
              printf '  - %s\n' "${no_tests[@]}"
              echo ""
            fi

            echo "Please ensure each subpackage has:"
            echo "  1. A CI workflow file: .github/workflows/ci-<subpackage-name>.yml"
            echo "  2. A test directory: mellea_contribs/<subpackage>/tests/ or test/"
            echo ""
            echo "Example CI file structure:"
            echo "  on:"
            echo "    pull_request:"
            echo "      paths:"
            echo "        - 'mellea_contribs/<subpackage>/**'"
            echo "        - '.github/workflows/ci-<subpackage>.yml'"
            echo "        - '.github/workflows/quality-generic.yml'"
            echo "  jobs:"
            echo "    test:"
            echo "      uses: ./.github/workflows/quality-generic.yml"
            echo "      with:"
            echo "        subpackage: mellea_contribs/<subpackage>"

            exit 1
          fi

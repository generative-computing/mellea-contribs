name: Quality - Tools Package

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CICD: 1

jobs:
  test-tools-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies and run tests
        run: |
          cd mellea_contribs/tools_package
          if ! command -v uv &> /dev/null; then
            echo "Installing uv..."
            pip install uv
          fi
          echo "Setting up virtual environment and installing dependencies..."
          uv sync --dev
          echo "Running tests..."
          uv run -- pytest -v test/test_double_round_robin.py test/test_top_k.py
      - name: Send failure message
        if: failure()
        run: echo "Tools package tests failed. Please verify that tests are working locally. Note - test_mprogram_robustness.py requires benchdrift package and is skipped."


name: Package CI (per-subpackage)

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string

permissions:
  contents: read

jobs:
  read-config:
    # Hoisted into its own job so its output can drive `timeout-minutes` on
    # the matrix job below — `timeout-minutes` is resolved when a job starts,
    # so it cannot reference a step output produced inside the same job.
    runs-on: ubuntu-latest
    outputs:
      skip_ollama: ${{ steps.ci-flags.outputs.skip_ollama }}
      timeout_minutes: ${{ steps.ci-flags.outputs.timeout_minutes }}
      python_versions: ${{ steps.ci-flags.outputs.python_versions }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Read [tool.mellea-contribs.ci] flags
        id: ci-flags
        working-directory: ${{ inputs.package }}
        run: |
          uv run --with tomli_w python -c "
          import tomllib, json, os
          data = tomllib.loads(open('pyproject.toml').read())
          ci = data.get('tool', {}).get('mellea-contribs', {}).get('ci', {})
          out = {
              'skip_ollama': bool(ci.get('skip_ollama', False)),
              'timeout_minutes': int(ci.get('timeout_minutes', 30)),
              'python_versions': ci.get('python_versions', ['3.12']),
          }
          for k, v in out.items():
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  if k == 'python_versions':
                      f.write(f'{k}={json.dumps(v)}\n')
                  else:
                      f.write(f'{k}={str(v).lower() if isinstance(v, bool) else v}\n')
          "

  package-ci:
    needs: read-config
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(needs.read-config.outputs.timeout_minutes) }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.read-config.outputs.python_versions) }}
    env:
      SKIP_OLLAMA: ${{ needs.read-config.outputs.skip_ollama }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5

      # Ollama install is pinned to a known good release tarball rather than
      # piping the upstream installer to sh — arbitrary code piped to sh is
      # exactly the supply-chain shape we don't want in CI.
      - name: Install Ollama
        if: env.SKIP_OLLAMA != 'true'
        env:
          OLLAMA_VERSION: "v0.5.7"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/ollama.tgz \
            "https://github.com/ollama/ollama/releases/download/${OLLAMA_VERSION}/ollama-linux-amd64.tgz"
          sudo tar -C /usr -xzf /tmp/ollama.tgz
          ollama --version

      - name: Start Ollama
        if: env.SKIP_OLLAMA != 'true'
        run: nohup ollama serve &

      - name: Pull granite4:micro
        if: env.SKIP_OLLAMA != 'true'
        run: ollama pull granite4:micro

      - name: Sync dependencies
        working-directory: ${{ inputs.package }}
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Lint
        working-directory: ${{ inputs.package }}
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Type-check
        working-directory: ${{ inputs.package }}
        run: uv run mypy .

      - name: Test
        working-directory: ${{ inputs.package }}
        run: uv run pytest -m "not qualitative and not e2e"

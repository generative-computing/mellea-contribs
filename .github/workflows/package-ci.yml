name: Package CI (per-subpackage)

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      mellea_ref:
        # When non-empty, repin mellea to this git branch (via `uv add`) so
        # tests run against `mellea @ <ref>`. This is the "smoke against
        # mellea@<ref>" mode; empty (the default) is the normal PR-CI path
        # that tests against the pinned mellea.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  read-config:
    # Hoisted into its own job so its output can drive `timeout-minutes` on
    # the matrix job below — `timeout-minutes` is resolved when a job starts,
    # so it cannot reference a step output produced inside the same job.
    runs-on: ubuntu-latest
    outputs:
      skip_ollama: ${{ steps.ci-flags.outputs.skip_ollama }}
      timeout_minutes: ${{ steps.ci-flags.outputs.timeout_minutes }}
      python_versions: ${{ steps.ci-flags.outputs.python_versions }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Read [tool.mellea-contribs.ci] flags
        id: ci-flags
        working-directory: ${{ inputs.package }}
        run: |
          uv run --with tomli_w python -c "
          import tomllib, json, os
          data = tomllib.loads(open('pyproject.toml').read())
          ci = data.get('tool', {}).get('mellea-contribs', {}).get('ci', {})
          out = {
              'skip_ollama': bool(ci.get('skip_ollama', False)),
              'timeout_minutes': int(ci.get('timeout_minutes', 30)),
              'python_versions': ci.get('python_versions', ['3.12']),
          }
          for k, v in out.items():
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  if k == 'python_versions':
                      f.write(f'{k}={json.dumps(v)}\n')
                  else:
                      f.write(f'{k}={str(v).lower() if isinstance(v, bool) else v}\n')
          "

  package-ci:
    needs: read-config
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(needs.read-config.outputs.timeout_minutes) }}
    # auto_issue_bot.py (smoke mode only) writes per-package state under
    # .github/bot-state/ and opens/updates issues, so the job requests write.
    # Reusable-workflow permissions are CAPPED by the caller: the smoke caller
    # grants contents/issues:write, while the PR-CI caller (ci.yml) grants only
    # its default read-only token — so the PR path is unchanged and the bot
    # steps (gated on MELLEA_REF) never run there anyway.
    permissions:
      contents: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.read-config.outputs.python_versions) }}
    env:
      SKIP_OLLAMA: ${{ needs.read-config.outputs.skip_ollama }}
      MELLEA_REF: ${{ inputs.mellea_ref }}
    steps:
      - uses: actions/checkout@v4
      # Ubuntu runners fill up: Ollama tarball + granite4:micro model + uv
      # envs exhaust the disk (seen as "No space left on device"). Reclaim
      # space first, same as quality-generic.yml / build-package.yml.
      - name: Free disk space
        uses: ./.github/actions/free-disk-space
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5

      # Ollama install is pinned to a known good release tarball rather than
      # piping the upstream installer to sh — arbitrary code piped to sh is
      # exactly the supply-chain shape we don't want in CI.
      - name: Install Ollama
        if: env.SKIP_OLLAMA != 'true'
        env:
          OLLAMA_VERSION: "v0.5.7"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/ollama.tgz \
            "https://github.com/ollama/ollama/releases/download/${OLLAMA_VERSION}/ollama-linux-amd64.tgz"
          sudo tar -C /usr -xzf /tmp/ollama.tgz
          ollama --version

      - name: Start Ollama
        if: env.SKIP_OLLAMA != 'true'
        run: nohup ollama serve &

      - name: Pull granite4:micro
        if: env.SKIP_OLLAMA != 'true'
        run: ollama pull granite4:micro

      - name: Sync dependencies
        working-directory: ${{ inputs.package }}
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      # Smoke mode only: repin mellea to the requested git branch. `uv add`
      # writes the pin into pyproject.toml + uv.lock, so later `uv run` syncs
      # *to* the branch instead of reverting it — no --no-sync dance needed.
      # Bound through env per AGENTS.md (never interpolate ${{ }} into a shell).
      - name: Override mellea with requested ref
        if: env.MELLEA_REF != ''
        working-directory: ${{ inputs.package }}
        run: |
          set -euo pipefail
          uv add "mellea @ git+https://github.com/generative-computing/mellea.git" --branch "${MELLEA_REF}"

      - name: Lint
        working-directory: ${{ inputs.package }}
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Type-check
        working-directory: ${{ inputs.package }}
        run: uv run mypy .

      - name: Test
        id: pytest
        working-directory: ${{ inputs.package }}
        run: uv run pytest -m "not qualitative and not e2e"

      # --- Smoke-only auto-issue bot reporting ------------------------------
      # These steps run only when this workflow was invoked as a mellea@<ref>
      # smoke (MELLEA_REF set). Keeping them inside the reusable workflow is
      # deliberate: a caller job that uses `uses:` cannot have its own steps,
      # and a matrix `uses:` job exposes only ONE aggregate `result` for the
      # whole matrix — so a separate reporting job cannot tell which package
      # passed and which failed. Here each package (and python version) has its
      # own step outcome, giving correct per-package granularity.
      - name: Record failure with auto-issue bot
        # Catch install/sync failures too, not just pytest failures —
        # steps.pytest.outcome is unset when an earlier step (e.g. uv sync)
        # broke before pytest ran, and we want those reported.
        if: failure() && env.MELLEA_REF != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PACKAGE: ${{ inputs.package }}
        run: |
          uv run python .github/scripts/auto_issue_bot.py \
            --action record-failure \
            --package "$PACKAGE" \
            --run-url "$RUN_URL"
      - name: Record recovery with auto-issue bot
        if: success() && env.MELLEA_REF != '' && steps.pytest.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          PACKAGE: ${{ inputs.package }}
        run: |
          uv run python .github/scripts/auto_issue_bot.py \
            --action record-recovery \
            --package "$PACKAGE" \
            --commit-sha "$COMMIT_SHA"

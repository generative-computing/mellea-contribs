name: CI - All Subpackages

on:
  pull_request:
    paths:
      - 'mellea_contribs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-generic.yml'
  push:
    branches:
      - main
    paths:
      - 'mellea_contribs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-generic.yml'

jobs:
  discover-subpackages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Discover changed subpackages
        id: set-matrix
        run: |
          # Determine the base for comparison
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            # Use github.event.before for push events (more reliable than HEAD~1)
            BASE_REF="${{ github.event.before }}"
            # Fallback to HEAD~1 if github.event.before is not available or is all zeros (initial commit)
            if [ -z "$BASE_REF" ] || [ "$BASE_REF" == "0000000000000000000000000000000000000000" ]; then
              BASE_REF="HEAD~1"
            fi
          fi

          # Validate that BASE_REF exists before proceeding
          if ! git rev-parse --verify "$BASE_REF" >/dev/null 2>&1; then
            echo "Warning: BASE_REF '$BASE_REF' does not exist or is invalid"
            echo "Falling back to testing all subpackages for safety"
            CHANGED_SUBPACKAGES=$(find mellea_contribs -maxdepth 1 -mindepth 1 -type d ! -name '__pycache__' ! -name '.pytest_cache' | sort)
          else
            # Get list of changed files (excluding deleted files) using status instead
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRTU $BASE_REF HEAD | grep "^mellea_contribs/" || true)

            # Extract unique subpackage directories that changed
            CHANGED_SUBPACKAGES=$(echo "$CHANGED_FILES" | grep -E '^mellea_contribs/[a-zA-Z0-9_-]+$' | sort -u || true)

            if [ -z "$CHANGED_SUBPACKAGES" ]; then
              # If no subpackages changed, check if workflow files changed
              WORKFLOW_CHANGED=$(git diff --name-only $BASE_REF HEAD | grep -E "\.github/workflows/(ci\.yml|quality-generic\.yml)" || true)
              if [ -n "$WORKFLOW_CHANGED" ]; then
                # Test all subpackages if workflow changed
                CHANGED_SUBPACKAGES=$(find mellea_contribs -maxdepth 1 -mindepth 1 -type d ! -name '__pycache__' ! -name '.pytest_cache' | sort)
              fi
            fi
          fi

          # Map subpackages to their configurations
          MATRIX=$(echo "$CHANGED_SUBPACKAGES" | jq -R -s -c 'split("\n")[:-1] | unique | map(select(length > 0)) | map({
            subpackage: .,
            skip_ollama: (if test("mellea-integration-core") or test("reqlib_package") then true else false end),
            timeout_minutes: (if test("crewai_backend") then 90 else 30 end)
          })')

          echo "matrix={\"include\":$(echo "$MATRIX" | jq -c '.[]' | jq -s -c '.')}" >> $GITHUB_OUTPUT

  test:
    needs: discover-subpackages
    strategy:
      matrix: ${{ fromJson(needs.discover-subpackages.outputs.matrix) }}
      max-parallel: 6
    uses: ./.github/workflows/quality-generic.yml
    with:
      subpackage: ${{ matrix.subpackage }}
      skip_ollama: ${{ matrix.skip_ollama }}
      timeout_minutes: ${{ matrix.timeout_minutes }}
